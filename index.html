<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GGshop — Roblox Scripts</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08060f;--s1:#0f0b1a;--s2:#140e22;--s3:#1a1230;
  --acc:#a855f7;--acc2:#7c3aed;--acc3:#c084fc;
  --pink:#ec4899;--cyan:#06b6d4;
  --text:#e2d9f3;--muted:#6b5f85;--dim:#9d8cc0;
  --border:#2a1f40;--border2:#3d2a5c;
  --green:#22c55e;
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}

/* ── HEADER ── */
header{padding:14px 28px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;
  background:linear-gradient(135deg,var(--acc3),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.nav{display:flex;gap:6px;align-items:center}
.nav-btn{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;
  padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .15s;border:none}
.nav-ghost{background:transparent;border:1px solid var(--border2);color:var(--dim)}
.nav-ghost:hover{border-color:var(--acc);color:var(--acc)}
.nav-solid{background:var(--acc2);color:#fff}
.nav-solid:hover{background:var(--acc)}

/* ── PAGES ── */
.page{display:none}.page.active{display:block}

/* ── HERO ── */
.hero{padding:52px 28px 36px;text-align:center;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1e0a3c 0%,transparent 70%);
  border-bottom:1px solid var(--border)}
.hero-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;
  color:var(--acc3);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);
  padding:5px 16px;border-radius:20px;margin-bottom:18px}
.hero h1{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:600;margin-bottom:10px;
  background:linear-gradient(135deg,#fff 0%,var(--acc3) 50%,var(--pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.hero p{color:var(--dim);font-size:14px;margin-bottom:28px}
.hero-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--acc3)}
.stat-l{font-size:12px;color:var(--muted);margin-top:2px}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;padding:18px 28px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.fb{font-size:13px;font-weight:500;padding:6px 16px;border:1px solid var(--border);
  background:var(--s1);color:var(--muted);cursor:pointer;border-radius:20px;transition:all .15s}
.fb:hover,.fb.on{border-color:var(--acc);color:var(--acc);background:rgba(168,85,247,.1)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:24px 28px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:var(--border2);transform:translateY(-2px);background:var(--s2)}
.card-img{width:100%;height:140px;object-fit:cover;background:linear-gradient(135deg,#1a0a30,#0f1a30);
  display:flex;align-items:center;justify-content:center;font-size:48px}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:16px}
.ctag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.5px;
  padding:3px 10px;border-radius:10px;margin-bottom:10px}
.ctag.auto{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.25)}
.ctag.visual{background:rgba(168,85,247,.15);color:var(--acc3);border:1px solid rgba(168,85,247,.25)}
.ctag.combat{background:rgba(236,72,153,.15);color:var(--pink);border:1px solid rgba(236,72,153,.25)}
.ctitle{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text)}
.cdesc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.cfoot{display:flex;align-items:center;justify-content:space-between}
.cprice{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--acc3)}
.cprice small{font-size:11px;color:var(--muted)}
.cbtn{font-size:12px;font-weight:500;padding:7px 16px;background:rgba(168,85,247,.15);
  border:1px solid var(--border2);color:var(--acc3);cursor:pointer;border-radius:8px;transition:all .15s}
.cbtn:hover{background:var(--acc2);color:#fff;border-color:var(--acc2)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(6px)}
.overlay.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--border2);border-radius:18px;
  width:100%;max-width:500px;overflow:hidden;max-height:90vh;overflow-y:auto}
.mhead{padding:20px 24px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#1a0a30,var(--s2));
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1}
.mtitle{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;
  background:linear-gradient(90deg,var(--acc3),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.xbtn{background:rgba(255,255,255,.06);border:none;color:var(--dim);
  width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.xbtn:hover{color:var(--pink);background:rgba(236,72,153,.15)}
.mimg{width:100%;height:180px;object-fit:cover;background:linear-gradient(135deg,#1a0a30,#0f1a30);
  display:flex;align-items:center;justify-content:center;font-size:64px}
.mimg img{width:100%;height:100%;object-fit:cover}
.mbody{padding:24px}
.mexec{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  padding:4px 10px;border-radius:20px;margin-bottom:14px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc)}
.mdesc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:16px}
.mfeats{list-style:none;margin-bottom:20px}
.mfeats li{font-size:13px;color:var(--text);padding:6px 0;border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:center}
.mfeats li:last-child{border:none}
.mfeats li::before{content:'✦';color:var(--acc);font-size:9px;flex-shrink:0}

/* ── PLANS ── */
.plans-title{font-size:13px;font-weight:600;color:var(--dim);margin-bottom:10px;letter-spacing:.5px}
.plans{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.plan{flex:1;min-width:120px;background:var(--s1);border:2px solid var(--border);border-radius:12px;
  padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.plan:hover{border-color:var(--border2)}
.plan.selected{border-color:var(--acc);background:rgba(168,85,247,.08)}
.plan-name{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:4px}
.plan-price{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--acc3)}
.plan-price small{font-size:11px;color:var(--muted)}
.plan-desc{font-size:11px;color:var(--muted);margin-top:4px}
.plan.popular{border-color:var(--acc2)}
.plan.popular .plan-name::after{content:' ★';color:var(--acc)}

.mfoot{padding:16px 24px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;background:var(--s1);gap:12px}
.mfinal-price{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--acc3)}
.buybtn{font-size:13px;font-weight:600;padding:12px 28px;
  background:linear-gradient(135deg,var(--acc2),var(--pink));color:#fff;border:none;
  cursor:pointer;border-radius:10px;transition:all .15s}
.buybtn:hover{opacity:.9;transform:translateY(-1px)}
.buybtn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── CABINET ── */
.cab-wrap{padding:28px;max-width:700px;margin:0 auto}
.cab-header{background:linear-gradient(135deg,#1a0a30,var(--s2));border:1px solid var(--border2);
  border-radius:16px;padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.avatar{width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc2),var(--pink));
  display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;flex-shrink:0}
.cab-name{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px}
.cab-meta{font-size:13px;color:var(--muted)}
.cab-logout{margin-left:auto;font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);
  padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .15s}
.cab-logout:hover{border-color:var(--pink);color:var(--pink)}
.section-title{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;
  color:var(--dim);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.purchase-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px;flex-wrap:wrap}
.p-name{font-size:14px;font-weight:600;margin-bottom:3px;color:var(--text)}
.p-meta{font-size:12px;color:var(--muted)}
.p-plan-badge{display:inline-block;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:6px;margin-left:6px;
  background:rgba(168,85,247,.15);color:var(--acc3);border:1px solid rgba(168,85,247,.25)}
.p-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.p-price{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--acc3)}
.copy-btn{font-size:12px;font-weight:500;padding:7px 14px;
  background:rgba(168,85,247,.15);border:1px solid var(--border2);
  color:var(--acc3);cursor:pointer;border-radius:8px;transition:all .15s;white-space:nowrap}
.copy-btn:hover{background:var(--acc2);color:#fff;border-color:var(--acc2)}

/* ── AUTH ── */
.auth-wrap{max-width:380px;margin:48px auto;padding:0 24px}
.auth-box{background:var(--s1);border:1px solid var(--border2);border-radius:18px;padding:32px}
.auth-title{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;
  text-align:center;margin-bottom:6px;color:var(--text)}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--dim);margin-bottom:6px;letter-spacing:.3px}
.field input{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-size:14px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--acc)}
.auth-btn{width:100%;padding:12px;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,var(--acc2),var(--pink));color:#fff;
  border:none;border-radius:10px;cursor:pointer;margin-top:8px;transition:opacity .15s}
.auth-btn:hover{opacity:.9}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-alt{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
.auth-alt a{color:var(--acc3);cursor:pointer}
.auth-err{color:#f87171;font-size:12px;text-align:center;margin-top:10px;min-height:18px}
.auth-ok{color:var(--green);font-size:12px;text-align:center;margin-top:10px;min-height:18px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--border2);
  border-radius:12px;padding:14px 20px;font-size:13px;color:var(--text);
  z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:#f87171;color:#f87171}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <div class="logo">GGshop</div>
  <nav class="nav">
    <button class="nav-btn nav-ghost" onclick="goto('shop')">Магазин</button>
    <button class="nav-btn nav-ghost" id="cab-btn" onclick="cabClick()">Кабинет</button>
    <button class="nav-btn nav-solid" id="auth-btn" onclick="goto('auth')" style="display:none">Войти</button>
  </nav>
</header>

<!-- ══ SHOP ══ -->
<div class="page active" id="page-shop">
  <div class="hero">
    <div class="hero-badge">✦ ROBLOX SCRIPTS ✦</div>
    <h1>GGshop</h1>
    <p>качественные скрипты по доступным ценам</p>
    <div class="hero-stats">
      <div class="stat"><div class="stat-n" id="s-count">6</div><div class="stat-l">скриптов</div></div>
      <div class="stat"><div class="stat-n">24/7</div><div class="stat-l">поддержка</div></div>
      <div class="stat"><div class="stat-n">100%</div><div class="stat-l">рабочие</div></div>
    </div>
  </div>
  <div class="filters">
    <button class="fb on" onclick="filter('all',this)">Все</button>
    <button class="fb" onclick="filter('auto',this)">Авто</button>
    <button class="fb" onclick="filter('visual',this)">Визуал</button>
    <button class="fb" onclick="filter('combat',this)">Боёвка</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- ══ CABINET ══ -->
<div class="page" id="page-cabinet">
  <div class="cab-wrap" id="cab-content"></div>
</div>

<!-- ══ AUTH ══ -->
<div class="page" id="page-auth">
  <div class="auth-wrap">

    <!-- LOGIN -->
    <div class="auth-box" id="box-login">
      <div class="auth-title">Войти</div>
      <div class="auth-sub">доступ к покупкам</div>
      <div class="field"><label>Email</label><input id="l-email" type="email" placeholder="email@example.com"/></div>
      <div class="field"><label>Пароль</label><input id="l-pass" type="password" placeholder="••••••••"/></div>
      <div class="auth-err" id="l-err"></div>
      <button class="auth-btn" id="l-btn" onclick="doLogin()">Войти</button>
      <div class="auth-alt">нет аккаунта? <a onclick="showBox('reg')">Регистрация</a></div>
    </div>

    <!-- REGISTER -->
    <div class="auth-box" id="box-reg" style="display:none">
      <div class="auth-title">Регистрация</div>
      <div class="auth-sub">создать аккаунт</div>
      <div class="field"><label>Никнейм</label><input id="r-nick" placeholder="твой никнейм"/></div>
      <div class="field"><label>Email</label><input id="r-email" type="email" placeholder="email@example.com"/></div>
      <div class="field"><label>Пароль</label><input id="r-pass" type="password" placeholder="минимум 6 символов"/></div>
      <div class="auth-err" id="r-err"></div>
      <div class="auth-ok" id="r-ok"></div>
      <button class="auth-btn" id="r-btn" onclick="doReg()">Создать аккаунт</button>
      <div class="auth-alt">уже есть аккаунт? <a onclick="showBox('login')">Войти</a></div>
    </div>

  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="mhead">
      <span class="mtitle" id="m-title">—</span>
      <button class="xbtn" onclick="closeModal()">×</button>
    </div>
    <div class="mimg" id="m-img">🖥</div>
    <div class="mbody">
      <div class="mexec"><span class="dot"></span><span id="m-exec">—</span></div>
      <div class="mdesc" id="m-desc">—</div>
      <ul class="mfeats" id="m-feats"></ul>
      <div class="plans-title">ВЫБЕРИ ПЛАН</div>
      <div class="plans" id="m-plans"></div>
    </div>
    <div class="mfoot">
      <div class="mfinal-price" id="m-final">— ₽</div>
      <button class="buybtn" id="m-buy">Купить</button>
    </div>
  </div>
</div>

// ══ STATE ══
let curScript = null, curPlanIdx = 0;
let user = null;

// ══ SUPABASE AUTH ══
sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    const { data } = await sb.from('profiles').select('nickname').eq('id', session.user.id).single();
    user = { id: session.user.id, email: session.user.email, nick: data?.nickname || session.user.email.split('@')[0] };
  } else {
    user = null;
  }
  updateNav();
});

async function doReg() {
  const nick  = document.getElementById('r-nick').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  const err   = document.getElementById('r-err');
  const ok    = document.getElementById('r-ok');
  const btn   = document.getElementById('r-btn');
  if (!nick || !email || !pass) { err.textContent = 'Заполни все поля'; return; }
  if (pass.length < 6) { err.textContent = 'Пароль минимум 6 символов'; return; }
  btn.disabled = true; btn.textContent = 'Создаём...'; err.textContent = '';
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) { err.textContent = error.message; btn.disabled = false; btn.textContent = 'Создать аккаунт'; return; }
  // Сохраняем никнейм
  if (data.user) await sb.from('profiles').upsert({ id: data.user.id, nickname: nick });
  ok.textContent = 'Аккаунт создан! Проверь email для подтверждения.';
  btn.disabled = false; btn.textContent = 'Создать аккаунт';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const err   = document.getElementById('l-err');
  const btn   = document.getElementById('l-btn');
  if (!email || !pass) { err.textContent = 'Заполни все поля'; return; }
  btn.disabled = true; btn.textContent = 'Входим...'; err.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = 'Неверный email или пароль'; btn.disabled = false; btn.textContent = 'Войти'; return; }
  btn.disabled = false; btn.textContent = 'Войти';
  goto('shop');
}

async function doLogout() {
  await sb.auth.signOut();
  goto('shop');
}

// ══ NAV ══
function updateNav() {
  const cabBtn  = document.getElementById('cab-btn');
  const authBtn = document.getElementById('auth-btn');
  if (user) {
    cabBtn.textContent = user.nick;
    authBtn.style.display = 'none';
  } else {
    cabBtn.textContent = 'Кабинет';
    authBtn.style.display = '';
  }
}
function cabClick() { if (user) goto('cabinet'); else goto('auth'); }

// ══ PAGES ══
function goto(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  if (p === 'cabinet') renderCabinet();
}
function showBox(b) {
  document.getElementById('box-login').style.display = b === 'login' ? 'block' : 'none';
  document.getElementById('box-reg').style.display   = b === 'reg'   ? 'block' : 'none';
}

// ══ GRID ══
function filter(cat, btn) {
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); renderGrid(cat);
}
function renderGrid(cat = 'all') {
  const g = document.getElementById('grid'); g.innerHTML = '';
  const labels = { auto:'Авто', visual:'Визуал', combat:'Боёвка' };
  const list = SCRIPTS.filter(s => cat === 'all' || s.cat === cat);
  document.getElementById('s-count').textContent = SCRIPTS.length;
  list.forEach(s => {
    const minPrice = Math.min(...s.plans.map(p => p.price));
    const maxPrice = Math.max(...s.plans.map(p => p.price));
    const priceStr = minPrice === maxPrice ? `${minPrice} ₽` : `от ${minPrice} ₽`;
    const d = document.createElement('div'); d.className = 'card';
    const imgHtml = s.img
      ? `<div class="card-img"><img src="${s.img}" alt="${s.title}" loading="lazy"/></div>`
      : `<div class="card-img">${s.emoji}</div>`;
    d.innerHTML = `${imgHtml}
      <div class="card-body">
        <span class="ctag ${s.cat}">${labels[s.cat]}</span>
        <div class="ctitle">${s.title}</div>
        <div class="cdesc">${s.short}</div>
        <div class="cfoot">
          <div class="cprice">${priceStr}${minPrice !== maxPrice ? `<small> / до ${maxPrice} ₽</small>` : ''}</div>
          <button class="cbtn" onclick="openModal(${s.id})">Подробнее</button>
        </div>
      </div>`;
    g.appendChild(d);
  });
}

// ══ MODAL ══
function openModal(id) {
  curScript = SCRIPTS.find(s => s.id === id); if (!curScript) return;
  curPlanIdx = curScript.plans.findIndex(p => p.popular) >= 0
    ? curScript.plans.findIndex(p => p.popular) : 0;
  document.getElementById('m-title').textContent = curScript.title;
  document.getElementById('m-exec').textContent  = curScript.exec;
  document.getElementById('m-desc').textContent  = curScript.desc;
  const mi = document.getElementById('m-img');
  mi.innerHTML = curScript.img ? `<img src="${curScript.img}" alt="${curScript.title}"/>` : curScript.emoji;
  const fl = document.getElementById('m-feats'); fl.innerHTML = '';
  curScript.feats.forEach(f => { const li = document.createElement('li'); li.textContent = f; fl.appendChild(li); });
  renderPlans();
  document.getElementById('m-buy').onclick = () => doBuy();
  document.getElementById('overlay').classList.add('open');
}
function renderPlans() {
  const c = document.getElementById('m-plans'); c.innerHTML = '';
  curScript.plans.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'plan' + (p.popular ? ' popular' : '') + (i === curPlanIdx ? ' selected' : '');
    d.innerHTML = `<div class="plan-name">${p.name}${p.popular ? ' ★' : ''}</div>
      <div class="plan-price">${p.price}<small> ₽</small></div>
      <div class="plan-desc">${p.desc}</div>`;
    d.onclick = () => { curPlanIdx = i; renderPlans(); };
    c.appendChild(d);
  });
  document.getElementById('m-final').textContent = curScript.plans[curPlanIdx].price + ' ₽';
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target.id === 'overlay') closeModal(); }

// ══ BUY ══
async function doBuy() {
  if (!user) { closeModal(); goto('auth'); return; }
  const plan = curScript.plans[curPlanIdx];
  const label = 'gg_' + curScript.id + '_' + Date.now();
  const ok = encodeURIComponent(SITE + '/success.html?label=' + label + '&sid=' + curScript.id + '&plan=' + encodeURIComponent(plan.name));
  const url = `https://yoomoney.ru/quickpay/confirm?receiver=${WALLET}&quickpay-form=button&targets=${encodeURIComponent('GGshop: ' + curScript.title + ' (' + plan.name + ')')}&sum=${plan.price}&label=${label}&successURL=${ok}`;
  // Сохраняем ожидаемую покупку в Supabase
  await sb.from('purchases').insert({
    user_id: user.id, script_id: curScript.id,
    script_title: curScript.title, plan_name: plan.name,
    price: plan.price, raw_url: curScript.raw, label, paid: false
  });
  window.open(url, '_blank');
  closeModal();
  toast('Перенаправляем на оплату...', 'ok');
}

// ══ CABINET ══
async function renderCabinet() {
  const c = document.getElementById('cab-content');
  if (!user) { c.innerHTML = `<div class="empty"><p style="font-size:32px;margin-bottom:10px">🔒</p><p>Войдите чтобы увидеть кабинет</p></div>`; return; }
  c.innerHTML = `<div class="cab-header">
    <div class="avatar">${user.nick[0].toUpperCase()}</div>
    <div><div class="cab-name">${user.nick}</div><div class="cab-meta">${user.email}</div></div>
    <button class="cab-logout" onclick="doLogout()">Выйти</button>
  </div>
  <div class="section-title">МОИ ПОКУПКИ</div>
  <div id="purchases-list"><div class="empty">Загрузка...</div></div>`;
  const { data, error } = await sb.from('purchases').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  const pl = document.getElementById('purchases-list');
  if (error || !data || !data.length) {
    pl.innerHTML = `<div class="empty"><p style="font-size:32px;margin-bottom:10px">📦</p><p>Покупок пока нет</p></div>`;
    return;
  }
  pl.innerHTML = data.map(p => `
    <div class="purchase-card">
      <div>
        <div class="p-name">${p.script_title}<span class="p-plan-badge">${p.plan_name}</span></div>
        <div class="p-meta">${new Date(p.created_at).toLocaleDateString('ru')} · ${p.price} ₽</div>
      </div>
      <div class="p-right">
        <button class="copy-btn" onclick="copyRaw('${p.raw_url}','${p.script_title}')">Скопировать ссылку</button>
      </div>
    </div>`).join('');
}

function copyRaw(url, title) {
  const cmd = `loadstring(game:HttpGet("${url}"))()`;
  navigator.clipboard.writeText(cmd).then(() => toast(`Скопировано! Вставь в executor.`, 'ok'));
}

// ══ TOAST ══
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ══ INIT ══
renderGrid();
</script>
