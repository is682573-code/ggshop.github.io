<!DOCTYPE html>
<html lang="ru">

<meta charset="UTF-8"/>

<title>GGshop — Roblox Scripts</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08060f;--s1:#0f0b1a;--s2:#140e22;
  --acc:#a855f7;--acc2:#7c3aed;--acc3:#c084fc;
  --pink:#ec4899;--cyan:#06b6d4;
  --text:#e2d9f3;--muted:#6b5f85;--dim:#9d8cc0;
  --border:#2a1f40;--border2:#3d2a5c;--green:#22c55e;
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
header{padding:14px 28px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px;flex-wrap:wrap}
.logo{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;
  background:linear-gradient(135deg,var(--acc3),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.nav-btn{font-size:13px;font-weight:500;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .15s;border:none}
.nav-ghost{background:transparent;border:1px solid var(--border2);color:var(--dim)}
.nav-ghost:hover{border-color:var(--acc);color:var(--acc)}
.nav-solid{background:var(--acc2);color:#fff}
.nav-solid:hover{background:var(--acc)}
.lang-toggle{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lang-btn{font-size:12px;font-weight:600;padding:6px 12px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s}
.lang-btn.on{background:var(--acc2);color:#fff}
.page{display:none}.page.active{display:block}
.hero{padding:52px 28px 36px;text-align:center;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1e0a3c 0%,transparent 70%);
  border-bottom:1px solid var(--border)}
.hero-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;
  color:var(--acc3);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);
  padding:5px 16px;border-radius:20px;margin-bottom:18px}
.hero h1{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:600;margin-bottom:10px;
  background:linear-gradient(135deg,#fff 0%,var(--acc3) 50%,var(--pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.hero p{color:var(--dim);font-size:14px;margin-bottom:28px}
.hero-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--acc3)}
.stat-l{font-size:12px;color:var(--muted);margin-top:2px}
.filters{display:flex;gap:8px;padding:18px 28px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.fb{font-size:13px;font-weight:500;padding:6px 16px;border:1px solid var(--border);
  background:var(--s1);color:var(--muted);cursor:pointer;border-radius:20px;transition:all .15s}
.fb:hover,.fb.on{border-color:var(--acc);color:var(--acc);background:rgba(168,85,247,.1)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:24px 28px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--border2);transform:translateY(-2px);background:var(--s2)}
.card-img{width:100%;height:140px;background:linear-gradient(135deg,#1a0a30,#0f1a30);
  display:flex;align-items:center;justify-content:center;font-size:52px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:16px}
.ctag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;margin-bottom:10px}
.ctag.auto{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.25)}
.ctag.visual{background:rgba(168,85,247,.15);color:var(--acc3);border:1px solid rgba(168,85,247,.25)}
.ctag.combat{background:rgba(236,72,153,.15);color:var(--pink);border:1px solid rgba(236,72,153,.25)}
.ctitle{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text)}
.cdesc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.cfoot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cprice{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--acc3)}
.cprice-usd{font-size:10px;color:var(--muted);margin-top:1px}
.cbtn{font-size:12px;font-weight:500;padding:7px 16px;background:rgba(168,85,247,.15);
  border:1px solid var(--border2);color:var(--acc3);cursor:pointer;border-radius:8px;transition:all .15s;white-space:nowrap}
.cbtn:hover{background:var(--acc2);color:#fff;border-color:var(--acc2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(6px)}
.overlay.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--border2);border-radius:18px;
  width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.mhead{padding:18px 22px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#1a0a30,var(--s2));
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1}
.mtitle{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;
  background:linear-gradient(90deg,var(--acc3),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.xbtn{background:rgba(255,255,255,.06);border:none;color:var(--dim);
  width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.xbtn:hover{color:var(--pink)}
.mimg{width:100%;height:170px;background:linear-gradient(135deg,#1a0a30,#0f1a30);
  display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden}
.mimg img{width:100%;height:100%;object-fit:cover}
.mbody{padding:22px}
.mexec{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  padding:4px 10px;border-radius:20px;margin-bottom:12px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc)}
.mdesc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:14px}
.mfeats{list-style:none;margin-bottom:18px}
.mfeats li{font-size:13px;color:var(--text);padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.mfeats li:last-child{border:none}
.mfeats li::before{content:'✦';color:var(--acc);font-size:9px;flex-shrink:0}
.plans-label{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:10px;letter-spacing:.3px}
.plans{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.plan{flex:1;min-width:90px;background:var(--s1);border:2px solid var(--border);border-radius:12px;
  padding:14px 10px;cursor:pointer;transition:all .15s;text-align:center;position:relative}
.plan:hover{border-color:var(--border2)}
.plan.selected{border-color:var(--acc);background:rgba(168,85,247,.08)}
.plan-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;
  background:linear-gradient(135deg,var(--acc2),var(--pink));color:#fff}
.plan-name{font-size:11px;font-weight:600;color:var(--dim);margin-bottom:4px}
.plan-rub{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--acc3)}
.plan-usd{font-size:10px;color:var(--muted);margin-top:1px}
.plan-sale{font-size:9px;color:var(--pink);font-weight:600;margin-top:4px}
.mfoot{padding:14px 22px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;background:var(--s1);gap:12px}
.mfinal-rub{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--acc3)}
.mfinal-usd{font-size:11px;color:var(--muted);margin-top:2px}
.buybtn{font-size:13px;font-weight:600;padding:12px 28px;
  background:linear-gradient(135deg,var(--acc2),var(--pink));color:#fff;border:none;
  cursor:pointer;border-radius:10px;transition:all .15s;white-space:nowrap}
.buybtn:hover{opacity:.9;transform:translateY(-1px)}
.cab-wrap{padding:28px;max-width:700px;margin:0 auto}
.cab-header{background:linear-gradient(135deg,#1a0a30,var(--s2));border:1px solid var(--border2);
  border-radius:16px;padding:22px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.avatar{width:50px;height:50px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc2),var(--pink));
  display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:700}
.cab-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px}
.cab-meta{font-size:12px;color:var(--muted)}
.cab-logout{margin-left:auto;font-size:12px;color:var(--muted);background:none;
  border:1px solid var(--border);padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .15s}
.cab-logout:hover{border-color:var(--pink);color:var(--pink)}
.section-title{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;
  color:var(--dim);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.purchase-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px;flex-wrap:wrap}
.p-name{font-size:14px;font-weight:600;margin-bottom:3px;color:var(--text)}
.p-plan-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;margin-left:6px;
  background:rgba(168,85,247,.15);color:var(--acc3);border:1px solid rgba(168,85,247,.25)}
.p-meta{font-size:12px;color:var(--muted)}
.copy-btn{font-size:12px;font-weight:500;padding:7px 16px;background:rgba(168,85,247,.15);
  border:1px solid var(--border2);color:var(--acc3);cursor:pointer;border-radius:8px;transition:all .15s;white-space:nowrap}
.copy-btn:hover{background:var(--acc2);color:#fff;border-color:var(--acc2)}
.auth-wrap{max-width:380px;margin:48px auto;padding:0 24px}
.auth-box{background:var(--s1);border:1px solid var(--border2);border-radius:18px;padding:30px}
.auth-title{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;text-align:center;margin-bottom:6px;color:var(--text)}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--dim);margin-bottom:6px}
.field input{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-size:14px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--acc)}
.auth-btn{width:100%;padding:12px;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,var(--acc2),var(--pink));color:#fff;
  border:none;border-radius:10px;cursor:pointer;margin-top:8px;transition:opacity .15s}
.auth-btn:hover{opacity:.9}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{color:#f87171;font-size:12px;text-align:center;margin-top:8px;min-height:16px}
.auth-ok{color:var(--green);font-size:12px;text-align:center;margin-top:8px;min-height:16px}
.auth-alt{text-align:center;font-size:13px;color:var(--muted);margin-top:14px}
.auth-alt a{color:var(--acc3);cursor:pointer}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--border2);
  border-radius:12px;padding:14px 20px;font-size:13px;color:var(--text);
  z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:300px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
</style>
</head>

// ══ AUTH ══
const sb_client = sb;
let user = null;
sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    const {data} = await sb.from('profiles').select('nickname').eq('id', session.user.id).single();
    user = { id: session.user.id, email: session.user.email, nick: data?.nickname || session.user.email.split('@')[0] };
  } else { user = null; }
  updateNav();
});

async function doReg() {
  const nick=document.getElementById('r-nick').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  const err=document.getElementById('r-err'), ok=document.getElementById('r-ok');
  const btn=document.getElementById('r-btn');
  if(!nick||!email||!pass){err.textContent=t('err_fill');return;}
  if(pass.length<6){err.textContent=t('err_short');return;}
  btn.disabled=true; btn.textContent='...'; err.textContent='';
  const {data, error}=await sb.auth.signUp({email, password:pass});
  if(error){err.textContent=error.message;btn.disabled=false;btn.textContent=t('rb');return;}
  if(data.user) await sb.from('profiles').upsert({id:data.user.id, nickname:nick});
  ok.textContent=t('ok_reg');
  btn.disabled=false; btn.textContent=t('rb');
}

async function doLogin() {
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'), btn=document.getElementById('l-btn');
  if(!email||!pass){err.textContent=t('err_fill');return;}
  btn.disabled=true; btn.textContent='...'; err.textContent='';
  const {error}=await sb.auth.signInWithPassword({email, password:pass});
  if(error){err.textContent=t('err_login');btn.disabled=false;btn.textContent=t('lb');return;}
  btn.disabled=false; btn.textContent=t('lb');
  goto('shop');
}
async function doLogout(){await sb.auth.signOut(); goto('shop');}

function updateNav() {
  const cb=document.getElementById('cab-btn'), ab=document.getElementById('auth-btn');
  if(user){cb.textContent=user.nick; ab.style.display='none';}
  else{cb.textContent=t('cab'); ab.style.display='';}
}
function cabClick(){if(user)goto('cabinet');else goto('auth');}
function goto(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(p==='cabinet') renderCabinet();
}
function showBox(b){
  document.getElementById('box-login').style.display=b==='login'?'block':'none';
  document.getElementById('box-reg').style.display=b==='reg'?'block':'none';
}

let curScript=null, curPlanIdx=0, currentCat='all';

function filter(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); currentCat=cat; renderGrid(cat);
}
function renderGrid(cat='all'){
  const g=document.getElementById('grid'); g.innerHTML='';
  SCRIPTS.filter(s=>cat==='all'||s.cat===cat).forEach(s=>{
    const prices=s.plans.map(p=>p.price);
    const minP=Math.min(...prices), maxP=Math.max(...prices);
    const priceStr = minP===maxP ? `${minP} ₽` : `${t('from')} ${minP} ₽`;
    const usdStr   = minP===maxP ? rubToUsd(minP) : `${rubToUsd(minP)} – ${rubToUsd(maxP)}`;
    const imgHtml  = s.img ? `<div class="card-img"><img src="${s.img}" alt="${s.title}" loading="lazy"/></div>`
                           : `<div class="card-img">${s.emoji}</div>`;
    const d=document.createElement('div'); d.className='card';
    d.innerHTML=`${imgHtml}
      <div class="card-body">
        <span class="ctag ${s.cat}">${t('tag_'+s.cat)}</span>
        <div class="ctitle">${s.title}</div>
        <div class="cdesc">${s.short[lang]}</div>
        <div class="cfoot">
          <div>
            <div class="cprice">${priceStr}</div>
            <div class="cprice-usd">${usdStr}</div>
          </div>
          <button class="cbtn" onclick="openModal(${s.id})">${t('details')}</button>
        </div>
      </div>`;
    g.appendChild(d);
  });
}

function openModal(id){
  curScript=SCRIPTS.find(s=>s.id===id); if(!curScript)return;
  const defIdx=curScript.plans.findIndex(p=>p.badge==='popular');
  curPlanIdx=defIdx>=0?defIdx:0;
  document.getElementById('m-title').textContent=curScript.title;
  document.getElementById('m-exec').textContent=curScript.exec;
  document.getElementById('m-desc').textContent=curScript.desc[lang];
  const mi=document.getElementById('m-img');
  mi.innerHTML=curScript.img?`<img src="${curScript.img}" alt="${curScript.title}"/>`:`${curScript.emoji}`;
  const fl=document.getElementById('m-feats'); fl.innerHTML='';
  curScript.feats[lang].forEach(f=>{const li=document.createElement('li');li.textContent=f;fl.appendChild(li);});
  document.getElementById('m-buy').textContent=t('buy');
  document.getElementById('m-buy').onclick=()=>doBuy();
  renderPlans();
  document.getElementById('overlay').classList.add('open');
}
function renderPlans(){
  const c=document.getElementById('m-plans'); c.innerHTML='';
  curScript.plans.forEach((p,i)=>{
    const sel=i===curPlanIdx;
    const d=document.createElement('div'); d.className='plan'+(sel?' selected':'');
    let badge='';
    if(p.badge==='popular') badge=`<div class="plan-badge">${t('popular')}</div>`;
    if(p.badge==='best')    badge=`<div class="plan-badge">${t('best')}</div>`;
    const sale=p.sale?`<div class="plan-sale">${p.sale[lang]}</div>`:'';
    d.innerHTML=`${badge}
      <div class="plan-name">${p.name[lang]}</div>
      <div class="plan-rub">${p.price}<span style="font-size:12px;color:var(--muted)"> ₽</span></div>
      <div class="plan-usd">${rubToUsd(p.price)}</div>${sale}`;
    d.onclick=()=>{curPlanIdx=i;renderPlans();};
    c.appendChild(d);
  });
  const sel=curScript.plans[curPlanIdx];
  document.getElementById('m-rub').textContent=sel.price+' ₽';
  document.getElementById('m-usd').textContent='≈ '+rubToUsd(sel.price);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target.id==='overlay')closeModal();}

async function doBuy(){
  if(!user){closeModal();goto('auth');return;}
  const plan=curScript.plans[curPlanIdx];
  const label='gg_'+curScript.id+'_'+Date.now();
  const successUrl=SITE+'/success.html?sid='+curScript.id+'&plan='+encodeURIComponent(plan.name[lang])+'&label='+label;
  const url=`https://yoomoney.ru/quickpay/confirm?receiver=${WALLET}&quickpay-form=button&targets=${encodeURIComponent('GGshop: '+curScript.title+' ('+plan.name[lang]+')')}&sum=${plan.price}&label=${label}&successURL=${encodeURIComponent(successUrl)}`;
  await sb.from('purchases').insert({
    user_id:user.id, script_id:curScript.id,
    script_title:curScript.title, plan_name:plan.name[lang],
    price_rub:plan.price, raw_url:curScript.raw, label, paid:false
  });
  window.open(url,'_blank');
  closeModal();
  toast(t('pay'),'ok');
}

async function renderCabinet(){
  const c=document.getElementById('cab-content');
  if(!user){
    c.innerHTML=`<div class="empty" style="padding:60px 28px"><p style="font-size:36px;margin-bottom:12px">🔒</p><p>${t('locked')}</p></div>`;
    return;
  }
  c.innerHTML=`<div class="cab-header">
    <div class="avatar">${user.nick[0].toUpperCase()}</div>
    <div><div class="cab-name">${user.nick}</div><div class="cab-meta">${user.email}</div></div>
    <button class="cab-logout" onclick="doLogout()">${t('logout')}</button>
  </div>
  <div class="section-title">${t('cab_title')}</div>
  <div id="purchases-list"><div class="empty">${t('loading')}</div></div>`;
  const {data}=await sb.from('purchases').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
  const pl=document.getElementById('purchases-list');
  if(!data||!data.length){
    pl.innerHTML=`<div class="empty"><p style="font-size:36px;margin-bottom:12px">📦</p><p>${t('empty')}</p></div>`;
    return;
  }
  pl.innerHTML=data.map(p=>`
    <div class="purchase-card">
      <div>
        <div class="p-name">${p.script_title}<span class="p-plan-badge">${p.plan_name}</span></div>
        <div class="p-meta">${new Date(p.created_at).toLocaleDateString(lang==='ru'?'ru-RU':'en-US')} · ${p.price_rub} ₽</div>
      </div>
      <button class="copy-btn" onclick="copyRaw('${p.raw_url}')">${t('copy_btn')}</button>
    </div>`).join('');
}

function copyRaw(url){
  navigator.clipboard.writeText(`loadstring(game:HttpGet("${url}"))()`)
    .then(()=>toast(t('copied'),'ok'));
}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type||'');
  setTimeout(()=>el.classList.remove('show'),3000);
}
